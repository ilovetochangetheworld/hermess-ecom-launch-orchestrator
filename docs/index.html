<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 电商合伙人演示材料</title>
  <style>
    :root {
      --ink: #101828;
      --muted: #667085;
      --line: #d9e2ec;
      --paper: #f7fafc;
      --blue: #2563eb;
      --green: #059669;
      font-family: "PingFang SC", "Microsoft YaHei", Inter, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(37,99,235,.07) 1px, transparent 1px),
        linear-gradient(0deg, rgba(5,150,105,.06) 1px, transparent 1px),
        var(--paper);
      background-size: 52px 52px;
    }
    main {
      min-height: 100vh;
      max-width: 1080px;
      margin: 0 auto;
      padding: 72px 24px;
      display: grid;
      align-content: center;
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 34px;
      align-items: end;
    }
    .eyebrow {
      color: var(--blue);
      font-weight: 800;
      margin-bottom: 14px;
    }
    h1 {
      max-width: 860px;
      margin: 0;
      font-size: clamp(42px, 6vw, 76px);
      line-height: 1.06;
      letter-spacing: 0;
    }
    p {
      max-width: 760px;
      margin: 22px 0 0;
      color: #344054;
      font-size: 22px;
      line-height: 1.55;
    }
    .qr-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,.94);
      padding: 18px;
      box-shadow: 0 20px 50px rgba(15,23,42,.08);
    }
    .qr-card img {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      border-radius: 8px;
      background: #fff;
    }
    .qr-card b {
      display: block;
      margin-top: 14px;
      font-size: 20px;
      line-height: 1.25;
    }
    .qr-card span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 38px;
    }
    a.card {
      display: block;
      min-height: 220px;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,.92);
      color: inherit;
      text-decoration: none;
      box-shadow: 0 20px 50px rgba(15,23,42,.08);
      transition: transform .18s ease, box-shadow .18s ease;
    }
    a.card:hover {
      transform: translateY(-3px);
      box-shadow: 0 26px 60px rgba(15,23,42,.13);
    }
    .card span {
      color: var(--green);
      font-size: 15px;
      font-weight: 800;
    }
    .card b {
      display: block;
      margin-top: 12px;
      font-size: 30px;
      line-height: 1.18;
    }
    .card em {
      display: block;
      margin-top: 18px;
      color: var(--muted);
      font-style: normal;
      font-size: 18px;
      line-height: 1.55;
    }
    footer {
      margin-top: 34px;
      color: var(--muted);
      font-size: 15px;
    }
    @media (max-width: 760px) {
      main { padding: 44px 18px; }
      .hero { grid-template-columns: 1fr; }
      .qr-card { max-width: 260px; }
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div>
        <div class="eyebrow">Hermess Agent 提效工坊</div>
        <h1>从 0 开张：你的 AI 电商合伙人</h1>
        <p>这里汇总客户可直接访问的演示材料：一份现场讲解用的流程页，以及一份小鸭子泡澡玩具的商品经营启动包示例。</p>
      </div>
      <aside class="qr-card">
        <img src="./qr-home.png" alt="扫码访问 AI 电商合伙人演示材料">
        <b>扫码访问</b>
        <span>手机打开本页，快速进入演示材料和小鸭子启动包示例。</span>
      </aside>
    </section>
    <div class="cards">
      <a class="card" href="./talk/">
        <span>Workshop Talk</span>
        <b>提效工坊演示材料</b>
        <em>用于现场播放和讲解，展示从选品、定价、文案、图片 Prompt、客服到复盘的完整流程。</em>
      </a>
      <a class="card" href="./duck_asset_pack/">
        <span>Asset Pack Example</span>
        <b>小鸭子商品经营启动包</b>
        <em>展示最终交付页效果，包括产品画像、内容资产、商品图片与 Prompt、客服 FAQ 和交付清单。</em>
      </a>
    </div>
    <footer>建议使用桌面浏览器访问演示页，按空格或方向键翻页。</footer>
  </main>
</body>
</html>
